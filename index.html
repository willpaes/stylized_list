<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css" >
</head>

<body>
    <ul class="todo-list">
        <li>
           <input type="checkbox" id="item1"/>
            <label for="item1">Item one</label>
            <ul class="sub-item">
                <li id="link1">
                    <a href="https://www.example.com" class="sub-item-link" target="_blank">First</a>
                    </li>
                    </ul>
            </li>
        <li>
           <input type="checkbox" id="item2"/>
            <label for="item2">Item two</label>
            <ul class="sub-item">
                <li id="link2">
                    <a href="https://www.example.com" class="sub-item-link" target="_blank">Second</a>
                    </li>
                    </ul>
            </li>
        <li>
           <input type="checkbox" id="item3"/>
            <label for="item3">Item three</label>
            <ul class="sub-item">
                <li id="link3">
                    <a href="https://www.example.com" class="sub-item-link" target="_blank">Third</a>
                    </li>
                    </ul>
            </li>
        <li>
           <input type="checkbox" id="item4"/>
            <label for="item4">Item four</label>
            <ul class="sub-item">
                <li id="link4">
                    <a href="https://www.example.com" class="sub-item-link" target="_blank">Fourth</a>
                    </li>
                    </ul>
            </li>
    </ul>

</body>

</html>
